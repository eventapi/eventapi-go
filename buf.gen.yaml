version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/eventapi/eventapi-go
    - file_option: go_package
      value: github.com/eventapi/eventapi-go/pkg/eventapi/v1;eventapiv1
plugins:
  - remote: buf.build/protocolbuffers/go
    out: pkg
    opt:
      - paths=source_relative
  - local: protoc-gen-eventapi
    out: examples/gen
    opt: paths=source_relative
  - local: protoc-gen-eventapi-sink
    out: examples/gen
